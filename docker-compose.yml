# Producción Gironasa: backend comparte red con wg-easy.
# API accesible en http://10.8.0.1:8000 desde la RPi (sma-push, iot-gateway).
#
# Requisitos:
#   - Contenedor wg-easy ya en marcha (docker ps | grep -i wg)
#   - WG_CONTAINER en .env = container_name real (por defecto wg-easy)
#
# Despliegue:
#   docker compose up -d --build
#
# Sin wg-easy (solo localhost/nginx): usa docker-compose.standalone.yml

services:
  backend:
    build: .
    container_name: backend
    env_file: .env
    environment:
      INFLUX_URL: http://172.17.0.1:8086
    network_mode: "container:${WG_CONTAINER:-wg-easy}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped