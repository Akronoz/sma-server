# Despliegue estándar: sma-server en localhost:8000 (nginx hace proxy desde fuera).
# Si necesitas compartir red con WireGuard, usa docker-compose.wg.yml

services:
  sma-server:
    build: .
    container_name: sma-server
    env_file: .env
    environment:
      INFLUX_URL: http://172.17.0.1:8086
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped