# Añade el servicio sma-server a tu stack existente.
# Si ya tienes un docker-compose.yml con WireGuard, copia solo el bloque
# "sma-server" y ajusta NOMBRE_CONTENEDOR_WG al nombre real.

services:
  sma-server:
    build: .
    container_name: sma-server
    env_file: .env
    environment:
      INFLUX_URL: http://172.17.0.1:8086
    network_mode: "service:NOMBRE_CONTENEDOR_WG"
    restart: unless-stopped
    depends_on:
      - NOMBRE_CONTENEDOR_WG